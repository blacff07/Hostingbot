version: '3.8'

services:
  bot:
    build: .
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - OWNER_ID=${OWNER_ID}
      - ADMIN_ID=${ADMIN_ID}
      - BOT_USERNAME=${BOT_USERNAME}
      - UPDATE_CHANNEL=${UPDATE_CHANNEL}
    ports:
      - "5000:5000"
    volumes:
      - ./upload_bots:/app/upload_bots
      - ./inf:/app/inf
      - ./execution_logs:/app/execution_logs
    restart: unless-stopped