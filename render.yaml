services:
  - type: web
    name: universal-file-host-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python src/main.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: OWNER_ID
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: BOT_USERNAME
        sync: false
      - key: UPDATE_CHANNEL
        sync: false